<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trade Marketing Chopp Costa</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f3f4f6;
}

canvas{
border:1px solid #ccc;
border-radius:6px;
}

</style>

</head>


<body class="p-6">

<div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow">

<h1 class="text-2xl font-bold mb-4 text-blue-900">
Sistema de Comodatos – Chopp Costa
</h1>

<form id="comodatoForm" class="space-y-6">

<div class="grid grid-cols-2 gap-4">

<div>
<label class="text-sm font-semibold">Fecha</label>
<input id="fecha" type="date" class="w-full border p-2 rounded"/>
</div>

<div>
<label class="text-sm font-semibold">Comodato Nº</label>
<input id="comodatoNumero" readonly class="w-full border p-2 rounded bg-gray-100"/>
</div>

<div>
<label>Técnico</label>
<input id="tecnico" class="w-full border p-2 rounded"/>
</div>

<div>
<label>Distribuidor</label>
<input id="distribuidor" class="w-full border p-2 rounded"/>
</div>

<div>
<label>CUIT</label>
<input id="cuit" class="w-full border p-2 rounded"/>
</div>

<div>
<label>Nombre Fantasía</label>
<input id="nombreFantasia" class="w-full border p-2 rounded"/>
</div>

<div>
<label>Razón Social</label>
<input id="razonSocial" class="w-full border p-2 rounded"/>
</div>

<div>
<label>Domicilio</label>
<input id="domicilio" class="w-full border p-2 rounded"/>
</div>

<div>
<label>Localidad</label>
<input id="localidad" class="w-full border p-2 rounded"/>
</div>

</div>


<div>

<label class="font-semibold">Firma</label>

<canvas id="signature" width="400" height="200"></canvas>

<button type="button" onclick="clearSignature()" class="text-sm text-red-600">
Limpiar firma
</button>

</div>


<div class="grid grid-cols-2 gap-4">

<div>
<label>Aclaración</label>
<input id="aclaracion" class="w-full border p-2 rounded"/>
</div>

<div>
<label>DNI</label>
<input id="dni" class="w-full border p-2 rounded"/>
</div>

</div>


<button type="submit"
class="bg-blue-900 text-white px-6 py-3 rounded w-full">

Guardar Comodato

</button>

</form>

</div>


<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwbadXv4EYTRo-OyKkvnsTCubbrJjM1QpICJRDcJPQRkOXHB1MPCDGrehMFGYbpHOFj/exec";


/* fecha actual */

document.getElementById("fecha").valueAsDate = new Date();


/* obtener numero comodato */

async function getNextNumber(){

const res = await fetch(API_URL+"?action=nextNumber");

const data = await res.json();

document.getElementById("comodatoNumero").value = data.comodatoNumero;

}

getNextNumber();


/* firma */

let canvas = document.getElementById("signature");
let ctx = canvas.getContext("2d");

let drawing = false;

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mouseup",stop);
canvas.addEventListener("mousemove",draw);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchend",stop);
canvas.addEventListener("touchmove",draw);

function start(e){
drawing = true;
draw(e);
}

function stop(){
drawing = false;
ctx.beginPath();
}

function draw(e){

if(!drawing) return;

e.preventDefault();

let rect = canvas.getBoundingClientRect();

let x = (e.touches?e.touches[0].clientX:e.clientX) - rect.left;
let y = (e.touches?e.touches[0].clientY:e.clientY) - rect.top;

ctx.lineWidth = 2;
ctx.lineCap = "round";

ctx.lineTo(x,y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(x,y);

}

function clearSignature(){

ctx.clearRect(0,0,canvas.width,canvas.height);

}



/* enviar formulario */

document.getElementById("comodatoForm").addEventListener("submit",async function(e){

e.preventDefault();

const firmaDataUrl = canvas.toDataURL();

const payload = {

fecha:document.getElementById("fecha").value,

tecnico:document.getElementById("tecnico").value,

distribuidor:document.getElementById("distribuidor").value,

cuit:document.getElementById("cuit").value,

nombreFantasia:document.getElementById("nombreFantasia").value,

razonSocial:document.getElementById("razonSocial").value,

domicilio:document.getElementById("domicilio").value,

localidad:document.getElementById("localidad").value,

aclaracion:document.getElementById("aclaracion").value,

dni:document.getElementById("dni").value,

firmaDataUrl:firmaDataUrl,

userAgent:navigator.userAgent,

submittedAt:new Date().toISOString()

};


const res = await fetch(API_URL,{

method:"POST",

body:JSON.stringify(payload)

});

const data = await res.json();

if(data.ok){

alert("Comodato guardado ✔");

window.location.reload();

}else{

alert(data.message);

}

});

</script>

</body>

</html>
